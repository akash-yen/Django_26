<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Varshemma Hotel{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --dark: #0f0d0a;
            --card-bg: #1a1712;
            --text: #f0ead6;
            --muted: #9e9278;
        }

        body {
            background-color: var(--dark);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAV */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
            border-bottom: 1px solid #1e1c18;
            position: sticky;
            top: 0;
            background: #0f0d0aee;
            backdrop-filter: blur(12px);
            z-index: 10;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--gold);
            text-decoration: none;
            letter-spacing: 0.02em;
        }

        .logo-mark {
            display: inline-block;
            margin-right: 8px;
        }

        .nav-back {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            transition: color 0.2s ease;
        }

        .nav-back:hover { color: var(--gold); }

        main { flex: 1; }

        /* FOOTER */
        footer {
            border-top: 1px solid #1e1c18;
            padding: 40px 24px 32px;
            text-align: center;
        }

        .location {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 22px;
            border: 1px solid #2e2820;
            border-radius: 100px;
            margin-bottom: 16px;
            transition: border-color 0.3s ease, transform 0.3s ease;
            text-decoration: none;
            color: var(--text);
        }

        .location:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
        }

        .location-pin {
            color: var(--gold);
            font-size: 1.1rem;
        }

        .location-text {
            font-size: 0.85rem;
            letter-spacing: 0.03em;
        }

        .copyright {
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            color: var(--muted);
            opacity: 0.7;
            margin-top: 8px;
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-bottom: 24px;
        }

        .social-link {
            width: 42px;
            height: 42px;
            border: 1px solid #2e2820;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            border-color: var(--gold);
            color: var(--gold);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px #c9a84c22;
        }

        .social-link svg {
            width: 16px;
            height: 16px;
        }

        .footer-divider {
            width: 60px;
            height: 1px;
            background: #2e2820;
            margin: 0 auto 28px;
        }

        /* ANIMATIONS */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.5; transform: scale(0.8); }
        }

        {% block extra_style %}{% endblock %}
    </style>
</head>
<body>

        <a href="{% url 'home' %}" class="logo">
            <span class="logo-mark">✦</span>Varshemma Hotel

    </nav>
